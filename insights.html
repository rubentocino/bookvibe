<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1325ec">
    <meta name="description" content="Analiza tus hábitos de lectura con NookVibe Insights. Estadísticas de páginas, libros leídos, tiempo de lectura y distribución de tu biblioteca.">
    <meta property="og:title" content="NookVibe - Insights de Lectura">
    <meta property="og:description" content="Estadísticas detalladas de tus hábitos de lectura.">
    <meta property="og:image" content="icons/icon-512.png">
    <meta property="og:type" content="website">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>NookVibe - Insights</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" />

    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        .insights-header {
            background: linear-gradient(135deg, var(--primary), #818cf8);
            color: white;
            padding: calc(1rem + env(safe-area-inset-top)) 1.5rem 2.5rem;
            border-bottom-left-radius: var(--rounded-3xl);
            border-bottom-right-radius: var(--rounded-3xl);
            margin-bottom: -1.5rem;
            position: relative;
            z-index: 10;
        }
        
        .chart-card {
            background-color: var(--bg-white);
            border-radius: var(--rounded-2xl);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-slate-100);
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
<div class="app-container" style="padding-bottom: 6rem;">
    
    <!-- Header -->
    <header class="insights-header" style="box-shadow: var(--shadow-lg);">
        <div class="flex items-center justify-between mb-2">
            <a href="profile.html" class="icon-btn" style="background-color: rgba(255,255,255,0.2); border: none; color: white;" aria-label="Volver a perfil">
                <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
            </a>
            <h2 class="text-lg font-bold text-white">Insights de Lectura</h2>
            <div style="width: 44px;"></div> <!-- Spacer -->
        </div>
        <p class="text-sm" style="color: rgba(255,255,255,0.8); text-align: center;">Tus hábitos y progreso analizados.</p>
    </header>

    <main class="page-content px-4" style="transform: translateY(0.5rem); padding-bottom: 2.5rem;">
        
        <!-- Summary Stats Grid -->
        <div class="stats-grid" style="margin-bottom: 1.5rem; position: relative; z-index: 20;">
            <div class="stat-box" style="background: white; border: 1px solid var(--border-slate-100);">
                <span class="material-symbols-outlined text-primary mb-2">emoji_events</span>
                <span class="text-10px uppercase font-bold text-slate-400 tracking-wider">Total Libros</span>
                <span id="insight-total-books" class="text-xl font-bold text-slate-900">-</span>
            </div>
            <div class="stat-box" style="background: white; border: 1px solid var(--border-slate-100);">
                <span class="material-symbols-outlined text-primary mb-2">auto_stories</span>
                <span class="text-10px uppercase font-bold text-slate-400 tracking-wider">Pág. Leídas</span>
                <span id="insight-total-pages" class="text-xl font-bold text-slate-900">-</span>
            </div>
            <div class="stat-box" style="background: white; border: 1px solid var(--border-slate-100);">
                <span class="material-symbols-outlined text-primary mb-2">schedule</span>
                <span class="text-10px uppercase font-bold text-slate-400 tracking-wider">Tiempo Total</span>
                <span id="insight-total-time" class="text-xl font-bold text-slate-900">-</span>
            </div>
        </div>

        <!-- Chart 1: Pages per Day (Last 7 Days) -->
        <div class="chart-card">
            <div class="flex items-center gap-2 mb-4">
                <span class="material-symbols-outlined text-primary">trending_up</span>
                <h3 class="text-base font-bold text-slate-900">Páginas (Últimos 7 días)</h3>
            </div>
            <div style="position: relative; height:200px; width:100%">
                <canvas id="chart-pages-week"></canvas>
            </div>
        </div>

        <!-- Chart 2: Books per Month -->
        <div class="chart-card">
            <div class="flex items-center gap-2 mb-4">
                <span class="material-symbols-outlined text-primary">calendar_month</span>
                <h3 class="text-base font-bold text-slate-900">Libros Leídos (Histórico)</h3>
            </div>
            <div style="position: relative; height:200px; width:100%">
                <canvas id="chart-books-month"></canvas>
            </div>
        </div>

        <!-- Chart 3: Shelf Distribution (Doughnut) -->
        <div class="chart-card">
            <div class="flex items-center gap-2 mb-4">
                <span class="material-symbols-outlined text-primary">pie_chart</span>
                <h3 class="text-base font-bold text-slate-900">Tu Biblioteca</h3>
            </div>
            <div style="position: relative; height:220px; width:100%; display: flex; justify-content: center;">
                <canvas id="chart-shelf-dist"></canvas>
            </div>
        </div>

    </main>
</div>

<script src="firebase.js"></script>
<script src="auth.js"></script>
<script src="script.js"></script>
<script>
    initInsights();
</script>
</body>
</html>
